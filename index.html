<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mini Music App</title>
<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #0f172a;
  font-family: Arial, sans-serif;
  transition: background 0.3s, color 0.3s;
  color: white;
}
body.light-mode {
  background: #f1f1f1;
  color: #000;
}

/* CARD */
.card {
  position: relative;
  width: 400px;
  height: 160px;
  border-radius: 20px;
  display: flex;
  justify-content: center;
  padding: 1rem;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(8px);
}

/* MUSIC BAR */
.music-bar {
  position: absolute;
  width: 90%;
  height: 50px;
  padding: 0.5rem;
  background: rgba(255, 255, 255, 0.15);
  box-shadow: 0 8px 32px 0 #0d2626;
  backdrop-filter: blur(8px);
  border-radius: 30px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

/* ALBUM */
.cover-img {
  width: 40px;
  height: 40px;
  object-fit: cover;
  border-radius: 5px;
}

.music-title {
  margin-left: 10px;
  flex-grow: 1;
}
.music-title div:first-child {
  font-weight: bold;
}
.music-title div:last-child {
  font-size: 12px;
  color: #ddd;
}

/* CONTROLS */
.music-control {
  display: flex;
  gap: 10px;
}
button {
  background: none;
  border: none;
  color: white;
  font-size: 18px;
  cursor: pointer;
}
button:active {
  transform: scale(0.9);
}

/* BOTTOM BAR */
.bottom-bar {
  position: absolute;
  bottom: 10px;
  width: 100%;
  display: flex;
  justify-content: space-between;
}

/* NAV */
.nav-bar {
  margin-left: 20px;
  width: 65%;
  height: 50px;
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(8px);
  border-radius: 30px;
  display: flex;
  justify-content: space-around;
  align-items: center;
}
.nav-bar div {
  cursor: pointer;
  padding: 5px 10px;
  border-radius: 20px;
  transition: 0.1s;
}
.nav-bar div:hover {
  background: rgba(255,255,255,0.2);
}

/* SETTINGS */
.settings-bar {
  margin-right: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
}
#volume {
  width: 100px;
}

/* PAGE CONTENT */
#page-content {
  position: absolute;
  top: 80px;
  width: 100%;
  text-align: center;
}
</style>
</head>
<body>
<div class="card">
  <div class="music-bar">
    <img id="cover" class="cover-img" src="cover.jpg" alt="cover">
    <div class="music-title">
      <div id="song-title">It Ain’t Over ‘Til It’s Over</div>
      <div id="song-artist">Lenny Kravitz</div>
    </div>
    <div class="music-control">
      <button id="prev">⏮️</button>
      <button id="play">▶️</button>
      <button id="next">⏭️</button>
    </div>
  </div>

  <div class="bottom-bar">
    <div class="nav-bar">
      <div id="nav-home">Home</div>
      <div id="nav-fav">Favorites</div>
      <div id="nav-lib">Library</div>
      <div id="nav-set">Settings</div>
    </div>
    <div class="settings-bar" id="settings-bar">
      <label for="volume">Vol</label>
      <input type="range" id="volume" min="0" max="1" step="0.01" value="0.5">
      <button id="toggle-mode">🌗</button>
    </div>
  </div>

  <div id="page-content">Welcome to your mini music app!</div>
</div>

<!-- Placeholder audio -->
<audio id="audio" src="your-audio.mp3"></audio>

<script>
const audio = document.getElementById("audio");
const playBtn = document.getElementById("play");
const prevBtn = document.getElementById("prev");
const nextBtn = document.getElementById("next");
const volumeSlider = document.getElementById("volume");
const toggleMode = document.getElementById("toggle-mode");
const pageContent = document.getElementById("page-content");
const navHome = document.getElementById("nav-home");
const navFav = document.getElementById("nav-fav");
const navLib = document.getElementById("nav-lib");
const navSet = document.getElementById("nav-set");

// Play / Pause
playBtn.addEventListener("click", () => {
  if (audio.paused) {
    audio.play();
    playBtn.textContent = "⏸️";
  } else {
    audio.pause();
    playBtn.textContent = "▶️";
  }
});

// Volume
volumeSlider.addEventListener("input", () => {
  audio.volume = volumeSlider.value;
});

// Light / Dark
toggleMode.addEventListener("click", () => {
  document.body.classList.toggle("light-mode");
});

// Navigation
navHome.addEventListener("click", () => {
  pageContent.textContent = "Welcome to your mini music app!";
});
navFav.addEventListener("click", () => {
  pageContent.textContent = "Favorites: It Ain’t Over ‘Til It’s Over";
});
navLib.addEventListener("click", () => {
  pageContent.textContent = "Library: Your uploaded audio goes here";
});
navSet.addEventListener("click", () => {
  pageContent.textContent = "Settings: Toggle light/dark & adjust volume";
});

// Prev / Next (placeholder)
prevBtn.addEventListener("click", () => {
  alert("Previous song (not implemented)");
});
nextBtn.addEventListener("click", () => {
  alert("Next song (not implemented)");
});
</script>
</body>
</html>
