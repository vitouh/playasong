<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Uiverse Music Player</title>
<style>
/* ================= YOUR ORIGINAL CSS ================= */
.card {
  position: relative;
  width: 400px;
  height: 160px;
  border-radius: 20px;
  display: flex;
  justify-content: center;
  padding: 1rem;
}

.music-bar {
  position: absolute;
  width: 90%;
  height: 50px;
  padding: 0.5rem;
  background: rgba(255, 255, 255, 0.15);
  box-shadow: 0 8px 32px 0 #0d2626;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-radius: 60px;
  border: 1px solid rgba(255, 255, 255, 0.18);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.music {
  position: absolute;
  width: 40px;
  height: 40px;
  background: rgba(149, 0, 255, 0.25);
  box-shadow: 0 8px 32px 0 #0d2626;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-radius: 15px;
  border: 1px solid rgba(255, 255, 255, 0.18);
  cursor: pointer;
}
.music::after {
  content: "It Ain’t Over ‘Til It’s Over";
  position: absolute;
  left: 45px;
  width: 130px;
  color: #fff;
  font-weight: 600;
}
.music::before {
  content: "Lenny Kravitz";
  position: absolute;
  bottom: 0;
  left: 45px;
  width: 125px;
  color: #ffffffce;
  font-size: 0.8rem;
  font-weight: 400;
  letter-spacing: 2px;
}

.music-control {
  position: absolute;
  right: 0;
  border-radius: 30px;
  width: 30%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: space-evenly;
}
.music-control svg, .music-control button {
  cursor: pointer;
}
.music-control svg:active, .music-control button:active {
  transform: scale(0.9);
}

.bottom-bar {
  position: absolute;
  bottom: 10px;
  width: 100%;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
}

.nav-bar {
  position: absolute;
  left: 20px;
  width: 70%;
  height: 60px;
  padding: 6px;
  background: rgba(255, 255, 255, 0.15);
  box-shadow: 0 8px 32px 0 #0d2626;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-radius: 60px;
  border: 1px solid rgba(255, 255, 255, 0.18);
  display: flex;
  align-items: center;
  justify-content: space-evenly;
}
.nav-icons {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 25%;
  padding: 6px;
  border-radius: 60px;
  cursor: pointer;
  transition: all 0.1s ease-in-out;
}
.nav-icons:hover {
  background-color: rgba(255, 255, 255, 0.15);
}
.nav-icons svg {
  transition: all 0.1s ease-in-out;
}
.nav-icons:hover svg {
  transform: translateY(-2px);
}
.nav-icons svg:active {
  transform: scale(0.9);
}

.search-bar {
  position: absolute;
  right: 20px;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.15);
  box-shadow: 0 8px 32px 0 #0d2626;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 1px solid rgba(255, 255, 255, 0.18);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.1s ease-in-out;
}
.search-bar:hover {
  transform: translateY(-2px);
}
.search-bar svg {
  transition: all 0.1s ease-in-out;
  transition-delay: 0.1s;
}
.search-bar:hover svg {
  transform: translateY(-2px);
}
.search-bar svg:active {
  transform: scale(0.9);
}

.shapes {
  position: absolute;
  width: 600px;
  height: 400px;
  z-index: -1;
}

.triangle {
  position: absolute;
  top: 20%;
  left: 10%;
  width: 100px;
  height: 100px;
  transform: rotate(-45deg);
  animation: move 12s linear infinite;
}

.circle {
  position: absolute;
  top: 30%;
  right: 30%;
  width: 80px;
  height: 80px;
  background-color: #c436eb;
  border-radius: 50%;
  animation: move 12s linear infinite;
  animation-delay: 2s;
}

.square {
  position: absolute;
  bottom: 40%;
  right: 60%;
  width: 50px;
  height: 50px;
  background-color: #def92e;
  border-radius: 12px;
  transform: rotate(45deg);
  animation: move 12s alternate-reverse infinite;
  animation-delay: 6s;
}

@keyframes move {
  from,
  to {
    transform: rotate(-45deg);
  }
  25%,
  75% {
    transform: translateX(30px) translateY(10px) rotate(30deg);
  }
  50% {
    transform: translateX(60px) translateY(20px);
  }
}
</style>
</head>
<body>

<!-- CARD UI -->
<div class="card">

  <div class="music-bar">
    <div class="music"></div>

    <div class="music-control">
      <button id="prev">⏮️</button>
      <button id="play">▶️</button>
      <button id="next">⏭️</button>
    </div>
  </div>

  <div class="bottom-bar">
    <div class="nav-bar">
      <div id="nav-home" class="nav-icons">Home</div>
      <div id="nav-fav" class="nav-icons">Favorites</div>
      <div id="nav-lib" class="nav-icons">Library</div>
      <div id="nav-set" class="nav-icons">Settings</div>
    </div>
    <div class="search-bar" id="settings-bar">
      <input type="range" id="volume" min="0" max="1" step="0.01" value="0.5" style="width: 50px;">
      <button id="toggle-mode">🌗</button>
    </div>
  </div>

  <div id="page-content" style="position:absolute;top:80px;width:100%;text-align:center;color:white;">Welcome!</div>

</div>

<!-- AUDIO -->
<audio id="audio" src="your-audio.mp3"></audio>

<script>
// ================= FUNCTIONALITY =================
const audio = document.getElementById("audio");
const playBtn = document.getElementById("play");
const prevBtn = document.getElementById("prev");
const nextBtn = document.getElementById("next");
const volumeSlider = document.getElementById("volume");
const toggleMode = document.getElementById("toggle-mode");

const navHome = document.getElementById("nav-home");
const navFav = document.getElementById("nav-fav");
const navLib = document.getElementById("nav-lib");
const navSet = document.getElementById("nav-set");

const pageContent = document.getElementById("page-content");

// SONG DATA (placeholder)
const songs = [
  {
    title: "It Ain’t Over ‘Til It’s Over",
    artist: "Lenny Kravitz",
    src: "your-audio.mp3",
    cover: "cover.jpg"
  }
];

let currentSong = 0;

// Load Song
function loadSong(index){
  const song = songs[index];
  audio.src = song.src;
  document.querySelector(".music::after")?.setAttribute("content", song.title);
  document.querySelector(".music::before")?.setAttribute("content", song.artist);
}

// Play / Pause
playBtn.addEventListener("click", ()=>{
  if(audio.paused){
    audio.play();
    playBtn.textContent = "⏸️";
  } else {
    audio.pause();
    playBtn.textContent = "▶️";
  }
});

// Volume
volumeSlider.addEventListener("input", ()=>{
  audio.volume = volumeSlider.value;
});

// Light / Dark toggle
toggleMode.addEventListener("click", ()=>{
  document.body.classList.toggle("light-mode");
});

// Nav buttons
navHome.addEventListener("click", ()=> pageContent.textContent="Home: Main Player");
navFav.addEventListener("click", ()=> pageContent.textContent="Favorites: It Ain’t Over ‘Til It’s Over");
navLib.addEventListener("click", ()=> pageContent.textContent="Library: Your uploaded audio");
navSet.addEventListener("click", ()=> pageContent.textContent="Settings: Light/Dark & Volume");

// Prev / Next placeholders
prevBtn.addEventListener("click", ()=> alert("Previous song not implemented"));
nextBtn.addEventListener("click", ()=> alert("Next song not implemented"));
</script>

</body>
</html>
